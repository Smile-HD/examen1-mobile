# Ajuste para equipo con 6GB RAM: evita OOM en dex/apk merge sin exceder memoria total.
org.gradle.jvmargs=-Xmx768m -Xms256m -Xss512k -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=128m -Dfile.encoding=UTF-8

# Fuerza Gradle a usar JDK 17 (más estable aquí que el JBR 21 de Android Studio para release).
org.gradle.java.home=C:/Program Files/Eclipse Adoptium/jdk-17.0.16.8-hotspot

# Limita workers concurrentes para reducir picos de memoria durante compilación.
org.gradle.workers.max=1

# En este proyecto conviene compilar sin daemon persistente para no acumular consumo.
org.gradle.daemon=false

# Evita paralelismo de tareas en módulos para bajar presión de memoria.
org.gradle.parallel=false

# Reduce threads del file watcher de Gradle en Windows.
org.gradle.vfs.watch=false

# Limita memoria del daemon de Kotlin durante compilación.
kotlin.daemon.jvmargs=-Xmx256m

# Evita errores de caches incrementales Kotlin en entornos con poca RAM.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process

android.useAndroidX=true
